<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh}canvas{display:block;border-radius:8px}</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  body {
    min-height: 360px;
    padding: 0;
    background: #06060f;
    position: relative;
    overflow: hidden;
    image-rendering: pixelated;
  }

  /* ====== SKY ====== */
  .sky {
    position: absolute; inset: 0;
    background: linear-gradient(
      to bottom,
      #0a0e2a 0%,
      #1a1d4a 38%,
      #3a2456 65%,
      #5a2a4e 84%,
      #7a2f3a 100%
    );
  }
  .sky::after {
    content:""; position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 30% at 50% 80%, rgba(255,180,100,.18), transparent 70%);
  }

  /* ====== STARS ====== */
  .stars { position: absolute; inset: 0; pointer-events: none; }
  .stars i { position: absolute; background: #fff; }
  .stars .small { width: 1px; height: 1px; opacity: .5; }
  .stars .med   { width: 2px; height: 2px; opacity: .8; }
  .stars .big   { width: 3px; height: 3px; opacity: .95; box-shadow: 0 0 4px #fff; }
  .stars .tw { animation: tw 2.4s ease-in-out infinite; }
  @keyframes tw { 0%,100% { opacity: .25; } 50% { opacity: 1; } }

  .shooter {
    position: absolute; top: 30px; left: -40px;
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #fff);
    transform: rotate(15deg); opacity: 0;
    animation: shoot 7s ease-in 2s infinite;
  }
  @keyframes shoot {
    0% { transform: translate(0,0) rotate(15deg); opacity: 0; }
    3% { opacity: 1; }
    10% { transform: translate(760px, 200px) rotate(15deg); opacity: 0; }
    100% { opacity: 0; }
  }

  /* ====== MOON ====== */
  .moon {
    position: absolute; right: 70px; top: 28px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffce8 0%, #ffe9b5 55%, #d9b66f 100%);
    box-shadow: 0 0 20px rgba(255,235,200,.4), 0 0 50px rgba(255,180,120,.2);
  }
  .moon::before { content:""; position:absolute; left:14px; top:14px; width:8px; height:8px; border-radius:50%; background:rgba(0,0,0,.12); }
  .moon::after  { content:""; position:absolute; left:30px; top:24px; width:6px; height:6px; border-radius:50%; background:rgba(0,0,0,.10); }

  /* ====== CLOUDS ====== */
  .cloud {
    position: absolute;
    background: rgba(180,180,210,.15);
    border-radius: 50%;
    filter: blur(.5px);
    animation: drift linear infinite;
  }
  @keyframes drift {
    from { transform: translateX(-260px); }
    to   { transform: translateX(760px); }
  }
  .cloud.c1 { top: 50px;  width: 120px; height: 22px; animation-duration: 38s; }
  .cloud.c2 { top: 90px;  width: 80px;  height: 16px; animation-duration: 52s; animation-delay: -16s; opacity: .7; }
  .cloud.c3 { top: 120px; width: 150px; height: 26px; animation-duration: 64s; animation-delay: -30s; opacity: .55; }

  /* ====== MOUNTAINS ====== */
  .mountain { position: absolute; left: 0; right: 0; width: 100%; pointer-events: none; }
  .mountain.far  { bottom: 50px; }
  .mountain.mid  { bottom: 38px; }
  .mountain.near { bottom: 22px; }

  /* 🔥 VOLCANO (peeks above the mid mountains) — one thing from Fire & Brimstone */
  .volcano {
    position: absolute;
    left: 460px; bottom: 86px;
    width: 90px; height: 60px;
    pointer-events: none;
  }
  .volcano .smoke {
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(60,60,80,.55);
    box-shadow: 0 0 6px rgba(0,0,0,.3);
    animation: smokeRise 4.5s linear infinite;
  }
  .volcano .smoke.s2 { animation-delay: -1.5s; }
  .volcano .smoke.s3 { animation-delay: -3.0s; }
  @keyframes smokeRise {
    0%   { transform: translate(38px, 0)  scale(.4); opacity: 0; }
    20%  { opacity: .7; }
    100% { transform: translate(34px, -68px) scale(1.5); opacity: 0; }
  }
  .volcano .glow {
    position: absolute; left: 36px; top: 8px;
    width: 14px; height: 4px;
    background: #ff3d00;
    box-shadow: 0 0 8px #ff5500, 0 -2px 8px #ff5500;
    animation: emberGlow 1.4s ease-in-out infinite;
  }
  @keyframes emberGlow { 0%,100% { opacity: .7; } 50% { opacity: 1; } }

  /* ====== ISLANDS ====== */
  .island {
    position: absolute;
    pointer-events: none;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-4px); }
  }
  .island.i1 { top: 96px;  left: 30px;  animation-delay: 0s;    }    /* with cactus */
  .island.i2 { top: 138px; left: 165px; animation-delay: -1.4s; }    /* with shell  */
  .island.i3 { top: 110px; right: 175px;animation-delay: -2.6s; }    /* with lantern */
  .island.i4 { top: 158px; right: 24px; animation-delay: -3.2s; }    /* with anchor */

  /* ====== FOREGROUND GROUND ====== */
  .ground {
    position: absolute; left:0; right:0; bottom:0;
    height: 22px;
    background:
      linear-gradient(to bottom, #4faa35 0%, #4faa35 5px, #3a8c2a 5px, #2a6a1e 60%, #1d4a14 100%);
    box-shadow: inset 0 2px 0 #6ec044;
    z-index: 10;
  }
  .ground::before {
    content:""; position: absolute; left:0; right:0; top:-4px; height: 5px;
    background:
      radial-gradient(2px 5px at 24px 5px,  #6ec044 60%, transparent 61%),
      radial-gradient(2px 4px at 96px 4px,  #6ec044 60%, transparent 61%),
      radial-gradient(2px 5px at 188px 5px, #6ec044 60%, transparent 61%),
      radial-gradient(2px 4px at 268px 4px, #6ec044 60%, transparent 61%),
      radial-gradient(2px 5px at 348px 5px, #6ec044 60%, transparent 61%),
      radial-gradient(2px 4px at 428px 4px, #6ec044 60%, transparent 61%),
      radial-gradient(2px 5px at 508px 5px, #6ec044 60%, transparent 61%),
      radial-gradient(2px 4px at 588px 4px, #6ec044 60%, transparent 61%),
      radial-gradient(2px 5px at 668px 5px, #6ec044 60%, transparent 61%);
  }

  /* 🐚 RISING BUBBLES — one thing from Deep Ocean */
  .bubble {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(128,222,234,.4);
    border: 1px solid rgba(128,222,234,.7);
    animation: bubbleRise 5s linear infinite;
  }
  @keyframes bubbleRise {
    0%   { transform: translateY(0); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(-120px); opacity: 0; }
  }

  /* ====== FIREFLIES ====== */
  .fly {
    position: absolute;
    width: 3px; height: 3px;
    background: #b888ff;
    border-radius: 50%;
    box-shadow: 0 0 6px #b888ff, 0 0 14px rgba(184,136,255,.5);
    animation: flyAround 6s ease-in-out infinite, pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity: 1; } }
  @keyframes flyAround {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(20px, -15px); }
    50%  { transform: translate(40px, 5px); }
    75%  { transform: translate(15px, 20px); }
    100% { transform: translate(0,0); }
  }

  /* ====== 🥷 LANTERN — one thing from Ninja Dojo ====== */
  .lantern {
    position: absolute;
    top: 38px; left: 240px;
    width: 18px; height: 30px;
    image-rendering: pixelated;
    animation: lanternSway 3s ease-in-out infinite;
  }
  @keyframes lanternSway {
    0%,100% { transform: rotate(-3deg); }
    50%     { transform: rotate(3deg); }
  }
  .lantern div { position: absolute; }
  .lantern .rope  { left: 8px;  top: 0;  width: 2px;  height: 8px; background: #5a4020; }
  .lantern .top   { left: 4px;  top: 7px; width: 10px; height: 2px; background: #3a1a1a; }
  .lantern .body  { left: 2px;  top: 9px; width: 14px; height: 14px; background: #c62828; box-shadow: inset 0 0 0 1px #8a1a1a; }
  .lantern .light { left: 6px;  top: 13px; width: 6px;  height: 6px; background: #ff9933; box-shadow: 0 0 10px #ff9933, 0 0 18px rgba(255,153,51,.6); }
  .lantern .bot   { left: 4px;  top: 23px; width: 10px; height: 2px; background: #3a1a1a; }
  .lantern .tassel{ left: 8px;  top: 25px; width: 2px;  height: 4px; background: #ff9933; }

  /* ====== TITLE ====== */
  .title-stack {
    position: absolute; left: 0; right: 0; top: 60px;
    text-align: center; z-index: 20;
  }
  .pw-title {
    font-family: 'Press Start 2P', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 38px; line-height: 1;
    display: inline-block;
    text-shadow:
      -2px  0  #1a0a2e,  2px  0 #1a0a2e,
       0  -2px #1a0a2e,  0   2px #1a0a2e,
      -2px -2px #1a0a2e,  2px  2px #1a0a2e,
      -2px  2px #1a0a2e,  2px -2px #1a0a2e,
       0   4px #08060a,
       0   8px rgba(0,0,0,.7);
  }
  .pw-title span { display: inline-block; animation: letBob 1.8s ease-in-out infinite; }
  @keyframes letBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  /* PARKOUR — electric purple, slight glow */
  .purple {
    color: #b888ff;
    filter: drop-shadow(0 0 8px rgba(184,136,255,.35));
  }
  .ivory  { color: #fff7d6; }
  .row2 { margin-top: 10px; }
  .sub {
    margin-top: 22px;
    color: rgba(255,255,255,.78); font-size: 9px;
    font-family: 'Press Start 2P', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    text-shadow: 0 2px 0 rgba(0,0,0,.7);
    letter-spacing: .02em;
  }
  .blink {
    margin-top: 16px;
    color: #4a9eff;
    font-family: 'Press Start 2P', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 10px; letter-spacing: .04em;
    text-shadow: 0 2px 0 #000, 0 0 8px rgba(74,158,255,.4);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: .15; } }

  /* ====== PLAYER — beyblade spin + bounce-away + return loop ====== */
  .player {
    position: absolute; left: 50%; bottom: 22px;
    width: 18px; height: 26px;
    image-rendering: pixelated;
    z-index: 11;
    animation: playerDance 4.2s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  .player-inner {
    width: 100%; height: 100%;
    position: relative;
    animation: playerSpin 4.2s ease-in-out infinite;
    transform-origin: 50% 50%;
  }
  @keyframes playerDance {
    0%   { transform: translateX(-50%) translateY(0)  scale(1);   }
    20%  { transform: translateX(-50%) translateY(-2px) scale(1.05); }
    25%  { transform: translateX(-50%) translateY(-8px) scale(1.1);  }
    40%  { transform: translateX(280px) translateY(-18px) scale(.9); }
    50%  { transform: translateX(280px) translateY(-22px) scale(.85); }
    60%  { transform: translateX(-50%)  translateY(-18px) scale(.95); }
    75%  { transform: translateX(-50%)  translateY(-2px)  scale(1.08); }
    80%  { transform: translateX(-50%)  translateY(0)     scale(1);    }
    100% { transform: translateX(-50%)  translateY(0)     scale(1);    }
  }
  @keyframes playerSpin {
    0%, 18%   { transform: rotateY(0) rotate(0); }
    20%       { transform: rotateY(0) rotate(-12deg); }
    25%       { transform: rotateY(0) rotate(0); }
    25.01%, 60% { transform: rotateY(720deg) rotate(360deg); animation-timing-function: linear; }
    65%       { transform: rotateY(0) rotate(8deg); }
    75%       { transform: rotateY(0) rotate(-3deg); }
    80%, 100% { transform: rotateY(0) rotate(0); }
  }
  .player > div { position: absolute; }
  .p1 { left:1px;  top:18px; width:7px;  height:8px;  background:#111; }
  .p2 { left:10px; top:18px; width:7px;  height:8px;  background:#111; }
  .p3 { left:0;    top:6px;  width:18px; height:14px; background:#b71c1c; }
  .p4 { left:0;    top:14px; width:18px; height:3px;  background:#3e2723; }
  .p5 { left:6px;  top:14px; width:6px;  height:3px;  background:#aaaaaa; }
  .p6 { left:3px;  top:0;    width:12px; height:8px;  background:#FFCC80; }
  .p7 { left:10px; top:2px;  width:3px;  height:3px;  background:#111; }
  .ph1 { left:0;   top:-5px; width:18px; height:5px;  background:#0a0a0a; }
  .ph2 { left:3px; top:-10px;width:12px; height:5px;  background:#0a0a0a; }
  .pb  { left:7px; top:-9px; width:4px;  height:3px;  background:#ddd; }

  /* ====== ENEMY ====== */
  .enemy {
    position: absolute; right: 60px; bottom: 22px;
    width: 12px; height: 18px;
    image-rendering: pixelated;
    z-index: 11;
    animation: enWalk 4s ease-in-out infinite;
  }
  @keyframes enWalk {
    0% { transform: translateX(0); }
    50% { transform: translateX(-30px); }
    100% { transform: translateX(0); }
  }
  .enemy div { position: absolute; }
  .e1 { left:1px; top:14px; width:4px; height:4px; background:#222; }
  .e2 { left:7px; top:14px; width:4px; height:4px; background:#222; }
  .e3 { left:0;   top:6px;  width:12px; height:9px; background:#8B0000; }
  .e4 { left:2px; top:2px;  width:8px;  height:5px; background:#FFCC80; }
  .e5 { left:6px; top:3px;  width:3px;  height:2px; background:#ff4444; box-shadow: 0 0 4px #ff4444; }
  .e6 { left:1px; top:-2px; width:10px; height:4px; background:#4a1500; }
  .e7 { left:3px; top:-5px; width:7px;  height:3px; background:#4a1500; }

  /* coin bobbing on left island */
  .coin {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #e8e8f8;
    box-shadow: 0 0 6px rgba(184,136,255,.6);
    animation: coinBob 1.6s ease-in-out infinite;
    z-index: 12;
  }
  .coin::after { content:""; position: absolute; left: 2px; top: 2px; width: 2px; height: 2px; border-radius: 50%; background: #fff; }
  @keyframes coinBob {
    0%,100% { transform: translateY(-2px); }
    50%     { transform: translateY(2px); }
  }
</style>
</head>
<body>
<div id="ts" style="position:fixed;inset:0;z-index:999;">
  <div class="sky"></div>
  <div class="stars" id="stars"></div>
  <div class="shooter"></div>
  <div class="moon"></div>

  <div class="cloud c1" style="left:0"></div>
  <div class="cloud c2" style="left:0"></div>
  <div class="cloud c3" style="left:0"></div>

  <!-- Mountain silhouettes — 3 depth layers -->
  <svg class="mountain far" viewBox="0 0 700 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon points="0,90 60,28 130,58 200,12 280,48 370,16 450,52 540,6 620,40 700,22 700,90" fill="#1c1438"/></svg>
  <svg class="mountain mid" viewBox="0 0 700 72" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon points="0,72 50,36 115,58 178,20 250,46 330,14 420,42 498,24 560,50 628,18 700,36 700,72" fill="#150e2c"/></svg>
  <svg class="mountain near" viewBox="0 0 700 55" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><polygon points="0,55 40,32 88,48 145,26 205,44 265,20 338,40 400,16 458,38 515,14 572,34 636,22 700,36 700,55" fill="#0e0820"/></svg>

  <!-- 🔥 VOLCANO (Fire & Brimstone) -->
  <div class="volcano">
    <div class="smoke s1" style="left: 38px; bottom: 30px;"></div>
    <div class="smoke s2" style="left: 38px; bottom: 30px;"></div>
    <div class="smoke s3" style="left: 38px; bottom: 30px;"></div>
    <svg viewBox="0 0 90 60" width="90" height="60" shape-rendering="crispEdges" style="position:absolute; left:0; bottom:0;">
      <!-- silhouette body -->
      <polygon points="0,60 30,18 38,12 52,12 60,18 90,60" fill="#1f0a0a"/>
      <!-- crater rim glow -->
      <rect x="34" y="10" width="22" height="2" fill="#4a1010"/>
      <rect x="36" y="10" width="18" height="1" fill="#ff3d00"/>
      <!-- lava drip on slope -->
      <rect x="46" y="14" width="2" height="6" fill="#ff5520"/>
      <rect x="46" y="20" width="2" height="3" fill="#ff3d00"/>
      <!-- subtle highlight on left flank -->
      <polygon points="30,18 38,12 38,18" fill="#3a0a0a"/>
    </svg>
    <div class="glow"></div>
  </div>

  <!-- Far mountains -->
  <svg class="mountain far" viewBox="0 0 700 80" preserveAspectRatio="none" height="80">
    <polygon points="0,80 60,30 120,55 200,15 280,45 340,20 420,50 500,25 580,45 680,18 700,40 700,80" fill="#2a2548"/>
  </svg>
  <!-- Mid mountains -->
  <svg class="mountain mid" viewBox="0 0 700 70" preserveAspectRatio="none" height="70">
    <polygon points="0,70 50,40 120,55 180,30 260,50 330,25 420,55 500,30 600,55 680,25 700,40 700,70" fill="#1d1d3a"/>
  </svg>
  <!-- Near hills + ⚓ tiny pirate ship sailing along the horizon -->
  <svg class="mountain near" viewBox="0 0 700 55" preserveAspectRatio="none" height="55">
    <path d="M0,55 L0,40 Q40,22 80,32 Q120,42 160,30 Q200,18 240,28 Q280,36 320,30 Q360,22 400,32 Q440,42 480,32 Q520,22 560,30 Q600,38 640,30 Q680,22 700,32 L700,55 Z"
          fill="#0d1a0e"/>
    <g fill="#0a1a0a">
      <polygon points="50,40 56,30 62,40"/>
      <polygon points="130,38 137,28 144,38"/>
      <polygon points="210,36 217,26 224,36"/>
      <polygon points="290,38 297,28 304,38"/>
      <polygon points="380,36 387,26 394,36"/>
      <polygon points="470,38 477,28 484,38"/>
      <polygon points="560,36 567,26 574,36"/>
      <polygon points="640,38 647,28 654,38"/>
    </g>
  </svg>

  <!-- ⚓ DISTANT PIRATE SHIP — one thing from Pirate Seas -->
  <svg style="position:absolute; left:0; bottom:48px; pointer-events:none;" width="40" height="22" viewBox="0 0 40 22" shape-rendering="crispEdges">
    <!-- hull -->
    <rect x="6" y="14" width="22" height="3" fill="#3a1f0a"/>
    <rect x="8" y="17" width="18" height="2" fill="#2a1505"/>
    <!-- mast -->
    <rect x="16" y="2" width="1" height="13" fill="#5a3a18"/>
    <!-- main sail -->
    <polygon points="9,4 16,2 16,13 9,13" fill="#e6dac0"/>
    <!-- jib sail -->
    <polygon points="17,5 24,11 17,12" fill="#d6c8a8"/>
    <!-- flag at the top -->
    <rect x="17" y="2" width="3" height="2" fill="#c62828"/>
  </svg>

  <!-- 🥷 LANTERN — Ninja Dojo (hanging from upper-left) -->
  <div class="lantern">
    <div class="rope"></div>
    <div class="top"></div>
    <div class="body"></div>
    <div class="light"></div>
    <div class="bot"></div>
    <div class="tassel"></div>
  </div>

  <!-- 🤠 ISLAND WITH CACTUS — Wild West -->
  <div class="island i1">
    <svg width="78" height="50" viewBox="0 0 78 50" shape-rendering="crispEdges">
      <!-- island body -->
      <rect x="6"  y="12" width="66" height="4" fill="#4faa35"/>
      <rect x="4"  y="14" width="70" height="3" fill="#4faa35"/>
      <rect x="2"  y="17" width="74" height="4" fill="#8b6030"/>
      <rect x="6"  y="21" width="66" height="4" fill="#6d4720"/>
      <rect x="12" y="25" width="54" height="4" fill="#5a3a18"/>
      <rect x="20" y="29" width="38" height="4" fill="#4a2e12"/>
      <rect x="28" y="33" width="22" height="3" fill="#3a240e"/>
      <rect x="32" y="36" width="14" height="3" fill="#2a180a"/>
      <!-- vine -->
      <rect x="20" y="17" width="2" height="14" fill="#3a8c2a"/>
      <rect x="22" y="22" width="3" height="2"  fill="#6ec044"/>
      <!-- 🌵 CACTUS centered on the island -->
      <rect x="36" y="2"  width="6" height="10" fill="#3a8c2a"/>
      <rect x="36" y="2"  width="2" height="10" fill="#6ec044"/>
      <rect x="40" y="2"  width="2" height="10" fill="#1d5d18"/>
      <rect x="32" y="5"  width="4" height="1" fill="#3a8c2a"/>
      <rect x="32" y="6"  width="4" height="4" fill="#3a8c2a"/>
      <rect x="42" y="3"  width="4" height="1" fill="#3a8c2a"/>
      <rect x="42" y="4"  width="4" height="4" fill="#3a8c2a"/>
      <!-- cactus flower bud -->
      <rect x="37" y="0"  width="4" height="1" fill="#ff7043"/>
    </svg>
  </div>

  <!-- 🐚 ISLAND WITH SHELL — Deep Ocean -->
  <div class="island i2">
    <svg width="60" height="40" viewBox="0 0 60 40" shape-rendering="crispEdges">
      <rect x="4"  y="10" width="52" height="3" fill="#4faa35"/>
      <rect x="2"  y="12" width="56" height="3" fill="#4faa35"/>
      <rect x="0"  y="15" width="60" height="4" fill="#8b6030"/>
      <rect x="4"  y="19" width="52" height="4" fill="#6d4720"/>
      <rect x="10" y="23" width="40" height="4" fill="#5a3a18"/>
      <rect x="20" y="27" width="20" height="3" fill="#4a2e12"/>

function startLv(wi,li){
  selW=wi;selL=li;const lv=WD[wi].ls[li];
  plats=lv.pl.map(p=>({x:p[0],y:p[1],w:p[2],h:p[3]}));
  coins=lv.co.map(c=>({x:c[0],y:c[1],got:false}));
  cpObj={x:lv.cp.x,y:lv.cp.y,hit:false};
  camX=0;deaths=0;runRank=-1;t0=Date.now();t1=0;hazards=[];hazardTimer=0;currentPush={timer:0,dir:0};
  movPlats=li===3?MP4[wi].map(m=>({x:m[0],y:m[1],w:m[2],h:m[3],x0:m[4],x1:m[5],spd:m[6],t:0})):[];
  enemies=plats.length>=7?(lv.en||[2,4,6]).map(i=>{
    const pl=plats[i];
    const cx=pl.x+pl.w/2-7;
    return{x:cx,y:pl.y-14,minX:pl.x,maxX:pl.x+pl.w-10,dir:1,w:10,h:14};
  }):[];

}

function ov(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function die(){sfx('die');deaths++;P.hearts=3;P.x=P.cpx;P.y=P.cpy;P.vx=0;P.vy=0;P.gnd=false;P.wall=0;P.df=60;}
function hurt(){
  if(P.df>0)return;
  sfx('die');P.hearts--;
  if(P.hearts<=0){deaths++;P.hearts=3;P.x=P.cpx;P.y=P.cpy;P.vx=0;P.vy=0;P.gnd=false;P.wall=0;}
  else{P.vx=(P.vx>0?-3:3);P.vy=-4;}
  P.df=90;
}
function upd(){
  if(phase!=='play')return;
  const p=P;if(p.df>0)p.df--;
  let mv=0;if(isL()){mv=-1.5;p.face=-1;}if(isR()){mv=1.5;p.face=1;}
  if(isJ())p.jbuf=10;
  if(p.jbuf>0){
    if(p.coy>0){p.vy=-11;sfx('jump');p.vx=0;p.coy=0;p.jbuf=0;}
    else if(p.wall&&!p.gnd){p.vy=-10;sfx('jump');p.vx=p.wall*-6;p.wall=0;p.jbuf=0;}
  }
  if(p.jbuf>0)p.jbuf--;
  if(p.wall&&!p.gnd&&((p.wall===1&&isR())||(p.wall===-1&&isL())))p.vy=Math.min(p.vy,1.2);
  p.vy=Math.min(p.vy+0.38,8);
  if(p.vx){p.vx*=p.gnd?.82:.88;if(Math.abs(p.vx)<.1)p.vx=0;}
  for(const mp of movPlats){mp.t+=mp.spd*.025;mp.x=mp.x0+(mp.x1-mp.x0)*(.5-.5*Math.cos(mp.t));}
  if(movPlats.length)plats.push(...movPlats);
  let tx=mv+p.vx;
  p.x+=tx;p.gnd=false;p.wall=0;
  for(const pl of plats){
    if(!ov(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h))continue;
    if(tx>0){p.x=pl.x-p.w;p.wall=1;}else if(tx<0){p.x=pl.x+pl.w;p.wall=-1;}
    else{p.x=(p.x+9<pl.x+pl.w/2)?pl.x-p.w:pl.x+pl.w;p.wall=tx>0?1:-1;}
    p.vx=0;
  }
  p.y+=p.vy;
  for(const pl of plats){
    if(!ov(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h))continue;
    if(p.vy>0){p.y=pl.y-p.h;p.vy=0;p.gnd=true;}
    else{p.y=pl.y+pl.h;p.vy=Math.max(p.vy,0);}
  }
  if(movPlats.length)plats.splice(-movPlats.length);
  if(p.gnd){p.coy=6;p.wall=0;}else p.coy=Math.max(0,p.coy-1);
  if(p.x<0)p.x=0;
  const lv=WD[selW].ls[selL];
  camX+=(Math.min(Math.max(p.x-W/3,0),lv.mw-W)-camX)*.1;
  for(const c of coins)if(!c.got&&ov(p.x,p.y,p.w,p.h,c.x-8,c.y-8,16,16)){c.got=true;sfx('coin');p.nc++;}
  if(!cpObj.hit&&ov(p.x,p.y,p.w,p.h,cpObj.x-14,cpObj.y-38,28,38)){cpObj.hit=true;sfx('checkpoint');P.cpx=cpObj.x-9;P.cpy=cpObj.y-26;}
  const g=lv.go;
  if(ov(p.x,p.y,p.w,p.h,g.x-20,g.y-28,40,28)){
    t1=Date.now();const li=selW*4+selL;runRank=recTime(li,t1-t0);
    if(!done[li]){done[li]=true;saveDone();}phase='complete';completedAt=Date.now();sfx('complete');
  }
  if(p.y>H+120)die();
  for(const e of enemies){
    if(e.dead){if(--e.respawn<=0){e.dead=false;e.x=(e.minX+e.maxX)/2;}continue;}
    e.x+=e.dir*0.2;
    if(e.x<=e.minX||e.x+e.w>=e.maxX)e.dir*=-1;
    if(P.df===0&&ov(P.x,P.y,P.w,P.h,e.x,e.y,e.w,e.h)){
      if(P.vy>0&&P.y+P.h<e.y+e.h*0.6){e.dead=true;e.respawn=420;P.vy=-7;}
      else hurt();
    }
  }
  // ── HAZARDS ───────────────────────────────────────────────────────────
  if(selW<5){
    hazardTimer++;
    const intervals=[300,240,360,270,300];
    if(hazardTimer>300&&hazardTimer%intervals[selW]===0&&hazards.length<4)_spawnHazard();
  }
  if(selW===3&&currentPush.timer>0){currentPush.timer--;P.vx+=currentPush.dir*0.14;}
  hazards=hazards.filter(h=>{
    h.life++;
    const px=P.x+9,py=P.y+13;
    if(h.type===0||h.type===1){// cannonball/shuriken
      h.x+=h.vx;if(h.type===1)h.rot+=0.22;
      if(h.x<camX-60||h.x>camX+W+60||h.life>500)return false;
      if(P.df===0&&Math.hypot(px-h.x,py-h.y)<h.r+9)hurt();
      return true;
    }else if(h.type===2){// tumbleweed
      h.x+=h.vx;h.vy+=0.35;h.y+=h.vy;h.rot+=h.vx*0.055;
      if(h.y+h.r>H-28){h.y=H-28-h.r;h.vy=-Math.abs(h.vy)*0.55;}
      if(h.x<camX-100||h.x>camX+W+100||h.life>700)return false;
      if(P.df===0&&Math.hypot(px-h.x,py-h.y)<h.r+8)hurt();
      return true;
    }else if(h.type===3){// jellyfish
      h.y+=h.vy;
      if(h.y<-30||h.life>600)return false;
      const pulse=0.8+0.3*Math.sin(sec()*4+h.x*.01);
      if(P.df===0&&Math.hypot(px-h.x,py-h.y)<h.r*pulse+9)hurt();
      return true;
    }else if(h.type===4){// lava geyser
      if(h.life>=150)return false;
      if(h.life>=50&&h.life<110){
        const gh=80*Math.sin(Math.PI*(h.life-50)/60);
        if(P.df===0&&Math.abs(px-h.x)<h.r&&P.y+P.h>H-28-gh)hurt();
      }
      return true;
    }
    return false;
  });
}
function _spawnHazard(){
  const h3=[160,260,350];
  if(selW===0){// Pirate: cannonball right→left
    hazards.push({x:camX+W+16,y:h3[Math.floor(Math.random()*3)],vx:-4.5,vy:0,r:10,type:0,life:0});
  }else if(selW===1){// Ninja: shuriken alternating sides
    const fr=hazardTimer%2===0;
    hazards.push({x:fr?camX+W+16:camX-16,y:h3[Math.floor(Math.random()*3)],vx:fr?-3.5:3.5,vy:0,r:8,type:1,life:0,rot:0});
  }else if(selW===2){// Wild West: tumbleweed from either edge
    const fr=hazardTimer%2===0;
    hazards.push({x:fr?camX+W+20:camX-20,y:H-55,vx:fr?-2.2:2.2,vy:-1.5,r:12,type:2,life:0,rot:0});
  }else if(selW===3){// Deep Ocean: current push (no hazard object)
    currentPush={timer:80,dir:hazardTimer%2===0?1:-1};
  }else if(selW===4){// Fire: lava geyser
    hazards.push({x:camX+100+Math.floor(Math.random()*(W-200)),y:H-28,r:14,type:4,life:0});
  }
}

function dPlat(pl){

  const TS=8;

  for(let ty=Math.ceil(y/TS)*TS;ty<y+h;ty+=TS)ctx.fillRect(x,ty,w,1);

  const cx0=Math.ceil(x/TS)*TS,cy0=Math.ceil(y/TS)*TS;

    ctx.fillRect(cx+2,cy+2,2,2);ctx.fillRect(cx+TS-4,cy+2,2,2);

    ctx.fillStyle='#C07838';
    for(let ix=x+2;ix<x+w-2;ix+=7){const n=((seed+ix*11)*1103515245)>>>0;if(n%3===0)ctx.fillRect(ix,y-2,3,2);}

    ctx.fillStyle='rgba(255,102,0,.55)';for(let ix=x+3;ix<x+w-3;ix+=9)ctx.fillRect(ix,y,1,3);
    ctx.fillStyle='rgba(255,34,0,.5)';for(let ix=x+5;ix<x+w;ix+=16){ctx.fillRect(ix,y-2,2,2);ctx.fillRect(ix+2,y-4,2,2);}
  }

      if(h.life<50){// warn: pulsing glow at ground
        const pulse=0.5+0.5*Math.sin(t*8+h.life*.4);
        ctx.fillStyle=`rgba(255,80,0,${0.2+pulse*0.3})`;
        ctx.beginPath();ctx.ellipse(gx,H-28,h.r+2,5,0,0,Math.PI*2);ctx.fill();
      }else if(h.life<110){// active: column
        const pct=(h.life-50)/60;
        const gh=80*Math.sin(Math.PI*pct);
        const grad=ctx.createLinearGradient(gx,H-28-gh,gx,H-28);
        grad.addColorStop(0,'rgba(255,240,100,.9)');
        grad.addColorStop(0.4,'rgba(255,120,0,.85)');
        grad.addColorStop(1,'rgba(200,30,0,.6)');
        ctx.fillStyle=grad;
        ctx.fillRect(gx-h.r*0.7,H-28-gh,h.r*1.4,gh);
        // lava particles
        for(let p2=0;p2<4;p2++){
          const px=gx-h.r+p2*h.r*0.5+Math.sin(t*6+p2)*4;
          const py=H-28-gh*0.8-Math.abs(Math.sin(t*5+p2))*20;
          ctx.fillStyle=`rgba(255,${160+p2*20},0,.85)`;
          ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
        }
      }else{// fade
        const a=Math.max(0,(150-h.life)/40)*0.4;
        ctx.fillStyle=`rgba(255,80,0,${a})`;
        ctx.fillRect(gx-h.r*0.7,H-50,h.r*1.4,22);
      }
    }
    ctx.restore();
  }
}
function dHUD(){
  const wd=WD[selW],acc=wd.c;
  ctx.fillStyle='rgba(4,4,14,.88)';ctx.fillRect(0,0,W,40);
  const [hr,hg,hb]=acc.match(/\w\w/g).map(h=>parseInt(h,16));
  ctx.fillStyle=`rgba(${hr},${hg},${hb},.10)`;ctx.fillRect(0,0,W,40);
  ctx.fillStyle=acc;ctx.fillRect(0,39,W,1);
  drawIcon(selW,20,19,18);
  txt(wd.n+' › '+wd.ls[selL].n,38,23,acc,9,'left',true);
  const ms=(phase==='play'?Date.now():t1)-t0;
  txt(fmt(ms),W/2-28,23,'#ffffff',13,'center',true);
  ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.arc(W/2+4,18,3,0,Math.PI*2);ctx.fill();
  txt(`${P.nc}/${coins.length}`,W/2+36,23,'#ffffff',11,'center',true);
  // Hearts (right side, above ESC hint)
  for(let i=0;i<3;i++)drawPixelHeart(W-94+i*14,10,i<P.hearts,'#ff4444');
  txt(`☠ ${deaths}`,W-9,17,'#ff6b6b',9,'right',false);
  txt('ESC = menu',W-9,31,'rgba(255,255,255,.25)',8,'right',false);
}

function starField(){ctx.fillStyle='rgba(255,255,255,.32)';for(let i=0;i<55;i++)ctx.fillRect((i*97+3)%W,(i*61+5)%H,1.2,1.2);}

function dMenu(){
  ctx.fillStyle='#06060f';ctx.fillRect(0,0,W,H);starField();
  txt('PARKOUR',W/2,H/2-46,'#b888ff',56,'center',true);
  txt('WORLDS',W/2,H/2+9,'#fff',56,'center',true);
  txt('5 worlds  ·  20 levels  ·  beat the clock',W/2,H/2+45,'rgba(255,255,255,.35)',13,'center',false);
  if(Math.floor(sec()*2)%2===0)txt('Press SPACE or click to start',W/2,H/2+83,'#4a9eff',14,'center',true);
}

function dWorldSelect(){
  ctx.fillStyle='#06060f';ctx.fillRect(0,0,W,H);starField();
  txt('Choose Your World',W/2,36,'#fff',15,'center',true);
  const cw=136,ch=316,gap=13,x0=(W-(5*cw+4*gap))/2;
  WD.slice(0,5).forEach((wd,wi)=>{
    const cx=x0+wi*(cw+gap),cy=50;
    const unlk=wUnlk(wi);
    ctx.fillStyle=unlk?'rgba(255,255,255,.07)':'rgba(255,255,255,.03)';
    ctx.strokeStyle=unlk?wd.c:'rgba(255,255,255,.15)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,8);ctx.fill();ctx.stroke();
    if(unlk){ctx.fillStyle=wd.c;ctx.beginPath();ctx.roundRect(cx,cy,cw,5,{upperLeft:8,upperRight:8,lowerLeft:0,lowerRight:0});ctx.fill();}
    drawIcon(wi,cx+cw/2,cy+44,unlk?28:24);
    txt(wd.n,cx+cw/2,cy+70,unlk?'#fff':'rgba(255,255,255,.3)',10,'center',true);
    if(unlk){
      for(let i=0;i<4;i++)txt('★',cx+cw/2-26+i*18,cy+90,done[wi*4+i]?wd.c:'rgba(255,255,255,.15)',14,'left',false);
      wd.ls.forEach((lv,li)=>{
        const bx=cx+6,by=cy+102+li*52,bw=cw-12,bh=46;
        const ul=lUnlk(wi,li);
        ctx.fillStyle=ul?'rgba(255,255,255,.08)':'rgba(255,255,255,.03)';
        ctx.strokeStyle=ul?wd.c:'rgba(255,255,255,.08)';ctx.lineWidth=1;
        ctx.beginPath();ctx.roundRect(bx,by,bw,bh,5);ctx.fill();ctx.stroke();
        txt(lv.n,bx+bw/2,by+15,ul?'#ddd':'rgba(255,255,255,.25)',9,'center',true);
        const li2=wi*4+li;
        if(done[li2])txt(bests[li2].length?'★ '+fmt(bests[li2][0]):'cleared',bx+bw/2,by+31,wd.c,9,'center',false);
        else txt(ul?'play':'🔒 locked',bx+bw/2,by+31,ul?'rgba(255,255,255,.4)':'rgba(255,255,255,.2)',9,'center',false);
        if(ul&&hit(bx,by,bw,bh)){startLv(wi,li);MC=false;}
      });
    }else{
      txt('🔒',cx+cw/2,cy+166,'rgba(255,255,255,.25)',28,'center',false);
      txt(`clear ${WD[wi-1].e}`,cx+cw/2,cy+210,'rgba(255,255,255,.2)',9,'center',false);
      txt('to unlock',cx+cw/2,cy+224,'rgba(255,255,255,.2)',9,'center',false);
    }
  });
  const pw=WD[5],pbx=W/2-90,pby=H-46,pbw=180,pbh=30;
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.strokeStyle='#aaaaaa';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(pbx,pby,pbw,pbh,5);ctx.fill();ctx.stroke();
  txt(`${pw.e}  ${pw.ls[0].n}  — practice`,W/2,pby+19,'#aaaaaa',10,'center',false);
  if(hit(pbx,pby,pbw,pbh)){startLv(5,0);MC=false;}
  txt('WASD / Arrows move  ·  Space jump  ·  Press into wall + jump = wall jump',W/2,H-52,'rgba(255,255,255,.25)',9,'center',false);
}

function dComplete(){
  const li=selW*4+selL,ms=t1-t0,b=bests[li];
  const wd=WD[selW],acc=wd.c;
  const elapsed=Date.now()-completedAt,scale=Math.min(1,elapsed/280);
  const mw=380,mh=320,mx=W/2-mw/2,my=H/2-mh/2+8;
  // Backdrop
  ctx.fillStyle='rgba(0,0,18,.85)';ctx.fillRect(0,0,W,H);
  // Floating accent particles
  const t=sec();
  for(let i=0;i<10;i++){
    const px=mx+(i/9)*mw+Math.sin(t*2.2+i)*18,py=my-4-((t*45+i*38)%90);
    ctx.globalAlpha=(0.12+0.1*Math.sin(t*3+i))*scale;
    ctx.fillStyle=acc;ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Scale-in transform
  ctx.save();ctx.translate(W/2,H/2+8);ctx.scale(scale,scale);ctx.translate(-W/2,-(H/2+8));
  // Card
  ctx.fillStyle='rgba(6,8,28,.96)';ctx.beginPath();ctx.roundRect(mx,my,mw,mh,8);ctx.fill();
  ctx.strokeStyle=acc;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(mx+.75,my+.75,mw-1.5,mh-1.5,8);ctx.stroke();
  ctx.fillStyle=acc;ctx.beginPath();ctx.roundRect(mx,my,mw,3,{upperLeft:8,upperRight:8,lowerLeft:0,lowerRight:0});ctx.fill();
  // Star above card
  txt('★',W/2,my-18+Math.sin(t*3)*3,acc,22,'center',false);
  // Breadcrumb
  drawIcon(selW,mx+22,my+28,14);
  txt(wd.n+' › '+wd.ls[selL].n.toUpperCase(),mx+36,my+32,acc,8,'left',false);
  // Heading
  txt('LEVEL COMPLETE!',W/2,my+65,acc,17,'center',true);
  // Time
  txt(fmt(ms),W/2,my+104,'#ffffff',25,'center',true);
  // Rank
  const rankCols=[acc,'rgba(200,200,215,.9)','rgba(185,155,120,.9)'];
  if(runRank>=0)txt(['★ NEW BEST!  #1','★ TOP 3  #2','★ TOP 3  #3'][runRank],W/2,my+130,rankCols[runRank],11,'center',true);
  else txt('no top-3 time',W/2,my+130,'rgba(255,255,255,.35)',10,'center',false);
  // Divider
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mx+28,my+144);ctx.lineTo(mx+mw-28,my+144);ctx.stroke();
  // Best times
  txt('BEST TIMES',W/2,my+158,'rgba(255,255,255,.45)',9,'center',false);
  b.forEach((t2,i)=>{
    const y=my+173+i*22,it=i===runRank;
    txt(['#1','#2','#3'][i],W/2-56,y,rankCols[i],10,'right',it);
    txt(fmt(t2),W/2-42,y,it?acc:'#cccccc',12,'left',it);
    if(it)txt('◀',W/2+44,y,acc,9,'left',false);
  });
  // Divider
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mx+28,my+242);ctx.lineTo(mx+mw-28,my+242);ctx.stroke();
  // Stats
  txt(`☠ ${deaths} death${deaths!==1?'s':''}`,W/2-65,my+260,'#ff6b6b',10,'center',false);
  txt(`${P.nc}/${coins.length} coins`,W/2+65,my+260,'rgba(200,210,230,.8)',10,'center',false);
  // Nav
  if(selW===5)txt('Practice complete!',W/2,my+290,'#aaaaaa',12,'center',true);
  else if(selW===4&&selL===3)txt('All 5 worlds conquered!',W/2,my+290,acc,12,'center',true);
  else if(selL<3&&Math.floor(sec()*2)%2===0)txt('SPACE → next level',W/2,my+290,acc,11,'center',true);
  else if(selL===3&&selW<4)txt(WD[selW+1].n+' unlocked!',W/2,my+290,'#CE93D8',11,'center',true);
  txt('ESC → world select',W/2,my+308,'rgba(255,255,255,.28)',9,'center',false);
  ctx.restore();
  txt('ESC → world select',W/2,H/2+124,'rgba(255,255,255,.4)',11,'center',false);
}

function loop(){
  requestAnimationFrame(loop);
  if(isEsc()){
    if(phase==='play'||phase==='complete'){phase='worldselect';MC=false;}
    else if(phase==='worldselect'){phase='menu';MC=false;}
  }
  if(phase==='menu'&&(isJ()||MC)){phase='worldselect';MC=false;}
  if(phase==='complete'&&isJ()&&selL<WD[selW].ls.length-1){startLv(selW,selL+1);MC=false;}
  upd();
  const _ts=document.getElementById('ts');
  if(phase==='menu'){if(_ts)_ts.style.display='block';cv.style.display='none';}
  else{if(_ts)_ts.style.display='none';cv.style.display='';}
  if(phase==='menu')dMenu();
  else if(phase==='worldselect')dWorldSelect();
  else{dBg();plats.forEach(dPlat);dMovPlats();coins.forEach(dCoin);dCP();dEnemies();dChest();dHazards();dPlayer();dHUD();if(phase==='complete')dComplete();}
  MC=false;for(const k in JP)delete JP[k];
}

load().finally(()=>loop());
</script></body></html>
