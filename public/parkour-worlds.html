function sfx(type){
  if(!AC)return;
  const t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  if(type==='jump'){
    o.type='square';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(480,t+.08);
    g.gain.setValueAtTime(.06,t);g.gain.linearRampToValueAtTime(0,t+.1);
    o.start(t);o.stop(t+.1);
  }else if(type==='coin'){
    o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.linearRampToValueAtTime(1400,t+.05);
    g.gain.setValueAtTime(.07,t);g.gain.linearRampToValueAtTime(0,t+.07);
    o.start(t);o.stop(t+.07);
  }else if(type==='die'){
    o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(60,t+.35);
    g.gain.setValueAtTime(.09,t);g.gain.linearRampToValueAtTime(0,t+.38);
    o.start(t);o.stop(t+.38);
  }else if(type==='checkpoint'){
    o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.setValueAtTime(660,t+.13);
    g.gain.setValueAtTime(.06,t);g.gain.setValueAtTime(.06,t+.13);g.gain.linearRampToValueAtTime(0,t+.28);
    o.start(t);o.stop(t+.28);
  }else if(type==='complete'){
    o.type='sine';
    o.frequency.setValueAtTime(440,t);o.frequency.setValueAtTime(550,t+.1);
    o.frequency.setValueAtTime(660,t+.2);o.frequency.setValueAtTime(880,t+.32);
    g.gain.setValueAtTime(.08,t);g.gain.linearRampToValueAtTime(0,t+.52);
    o.start(t);o.stop(t+.52);
  }
}

let done=new Array(21).fill(false);
let bests=Array.from({length:21},()=>[]);
async function load(){
  try{const r=await window.storage.get('ppd2');if(r)done=JSON.parse(r.value);}catch(e){}
  for(let i=0;i<21;i++)try{const r=await window.storage.get(`ppb2_${i}`);if(r)bests[i]=JSON.parse(r.value);}catch(e){}
}
const saveDone=()=>{try{window.storage.set('ppd2',JSON.stringify(done));}catch(e){}};
const saveBest=i=>{try{window.storage.set(`ppb2_${i}`,JSON.stringify(bests[i]));}catch(e){}};

const wUnlk=wi=>wi===0||wi===5||[0,1,2,3].every(li=>done[(wi-1)*4+li]);
const lUnlk=(wi,li)=>wUnlk(wi)&&(li===0||done[wi*4+li-1]);
function recTime(li,ms){bests[li].push(ms);bests[li].sort((a,b)=>a-b);if(bests[li].length>3)bests[li].pop();saveBest(li);return bests[li].indexOf(ms);}

  const p=P;if(p.df>0)p.df--;
  let mv=0;if(isL()){mv=-1.5;p.face=-1;}if(isR()){mv=1.5;p.face=1;}
  if(isJ())p.jbuf=10;

    else if(p.wall&&!p.gnd){p.vy=-10;sfx('jump');p.vx=p.wall*-6;p.wall=0;p.jbuf=0;}
  }
  if(p.jbuf>0)p.jbuf--;
  if(p.wall&&!p.gnd&&((p.wall===1&&isR())||(p.wall===-1&&isL())))p.vy=Math.min(p.vy,1.2);
  p.vy=Math.min(p.vy+0.38,8);
  if(p.vx){p.vx*=p.gnd?.82:.88;if(Math.abs(p.vx)<.1)p.vx=0;}
  for(const mp of movPlats){mp.t+=mp.spd*.025;mp.x=mp.x0+(mp.x1-mp.x0)*(.5-.5*Math.cos(mp.t));}
  if(movPlats.length)plats.push(...movPlats);
  let tx=mv+p.vx;
  p.x+=tx;p.gnd=false;p.wall=0;
  for(const pl of plats){
    if(!ov(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h))continue;
    if(tx>0){p.x=pl.x-p.w;p.wall=1;}else if(tx<0){p.x=pl.x+pl.w;p.wall=-1;}
    else{p.x=(p.x+9<pl.x+pl.w/2)?pl.x-p.w:pl.x+pl.w;p.wall=tx>0?1:-1;}
    p.vx=0;
  }
  p.y+=p.vy;
  for(const pl of plats){
    if(!ov(p.x,p.y,p.w,p.h,pl.x,pl.y,pl.w,pl.h))continue;
    if(p.vy>0){p.y=pl.y-p.h;p.vy=0;p.gnd=true;}
    else{p.y=pl.y+pl.h;p.vy=Math.max(p.vy,0);}
  }
  if(movPlats.length)plats.splice(-movPlats.length);
  if(p.gnd){p.coy=6;p.wall=0;}else p.coy=Math.max(0,p.coy-1);
  if(p.x<0)p.x=0;
  const lv=WD[selW].ls[selL];
  camX+=(Math.min(Math.max(p.x-W/3,0),lv.mw-W)-camX)*.1;
  for(const c of coins)if(!c.got&&ov(p.x,p.y,p.w,p.h,c.x-8,c.y-8,16,16)){c.got=true;sfx('coin');p.nc++;}
  if(!cpObj.hit&&ov(p.x,p.y,p.w,p.h,cpObj.x-14,cpObj.y-38,28,38)){cpObj.hit=true;sfx('checkpoint');P.cpx=cpObj.x-9;P.cpy=cpObj.y-26;}
  const g=lv.go;
  if(ov(p.x,p.y,p.w,p.h,g.x-20,g.y-28,40,28)){
    t1=Date.now();const li=selW*4+selL;runRank=recTime(li,t1-t0);
    if(!done[li]){done[li]=true;saveDone();}phase='complete';sfx('complete');
  }
  if(p.y>H+120)die();
  for(const e of enemies){
    if(e.dead){
      if(--e.respawn<=0){e.dead=false;e.x=(e.minX+e.maxX)/2;}
      continue;
    }
    e.x+=e.dir*0.2;
    if(e.x<=e.minX||e.x+e.w>=e.maxX)e.dir*=-1;
    if(P.df===0&&ov(P.x,P.y,P.w,P.h,e.x,e.y,e.w,e.h)){
      if(P.vy>0&&P.y+P.h<e.y+e.h*0.6){e.dead=true;e.respawn=420;P.vy=-7;}
      else die();
    }
  }
}

function dBg(){
  const wd=WD[selW],t=sec();
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,wd.bg[0]);g.addColorStop(1,wd.bg[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(selW===0){
    ctx.fillStyle='rgba(180,210,255,.1)';
    for(let i=0;i<4;i++){const cx=((i*230+t*18)%920)-60;ctx.beginPath();ctx.ellipse(cx,55+i*8,38,18,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+26,44+i*8,28,16,0,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(255,235,100,.9)';ctx.beginPath();ctx.arc(700,60,28,0,Math.PI*2);ctx.fill();
  }else if(selW===1){
    ctx.fillStyle='rgba(255,255,255,.5)';for(let i=0;i<45;i++)ctx.fillRect((i*97+3)%W,(i*67+5)%280,1.5,1.5);
    ctx.fillStyle='rgba(255,245,200,.85)';ctx.beginPath();ctx.arc(660,55,26,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=wd.bg[0];ctx.beginPath();ctx.arc(672,47,22,0,Math.PI*2);ctx.fill();
  }else if(selW===2){
    ctx.fillStyle='rgba(255,200,50,.85)';ctx.beginPath();ctx.arc(680,65,32,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(90,30,8,.35)';
    [[50,310,80,120],[580,295,110,140],[660,285,55,150]].forEach(([x,y,w,h])=>{ctx.fillRect(x,y,w,h);ctx.fillRect(x-10,y+25,w+20,h);});
  }else if(selW===3){
    ctx.fillStyle='rgba(0,180,255,.05)';
    for(let i=0;i<6;i++){const bx=((i*160+t*22)%900)-50,by=H-60-(((t*55+i*75)%H));ctx.beginPath();ctx.arc(bx,by,3+i%3*2,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='rgba(0,220,200,.1)';
    for(let i=0;i<3;i++){const fx=((i*270+t*35)%900)-50,fy=100+i*90;ctx.beginPath();ctx.ellipse(fx,fy,20,9,0,0,Math.PI*2);ctx.fill();}
  }else{
    ctx.fillStyle='rgba(255,80,0,.12)';
    for(let i=0;i<9;i++){const ex=((i*100+t*38)%880),ey=H-70-(((t*48+i*52)%(H-80)));ctx.beginPath();ctx.arc(ex,ey,3+i%3,0,Math.PI*2);ctx.fill();}
  }
  ctx.fillStyle=wd.bot;ctx.fillRect(0,H-28,W,28);
  if(selW===4){ctx.fillStyle='rgba(255,60,0,.5)';ctx.fillRect(0,H-28,W,28);}
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){const wx=((sec()*55+i*160)%W);ctx.beginPath();ctx.arc(wx,H-18,22,Math.PI,0);ctx.stroke();}
}
function dPlat(pl){
  const sx=pl.x-camX,sy=pl.y,sw=pl.w,sh=pl.h;
  if(sx+sw<-5||sx>W+5)return;
  if(selW===0){ctx.fillStyle='#7a5c12';ctx.fillRect(sx,sy,sw,sh);ctx.fillStyle='#9a7520';ctx.fillRect(sx,sy,sw,3);ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=1;for(let i=sx;i<sx+sw;i+=18){ctx.beginPath();ctx.moveTo(i,sy);ctx.lineTo(i,sy+sh);ctx.stroke();}}
  else if(selW===1){ctx.fillStyle='#1e1c2a';ctx.fillRect(sx,sy,sw,sh);ctx.fillStyle='#c62828';ctx.fillRect(sx,sy,sw,3);ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;for(let i=sx;i<sx+sw;i+=20){ctx.beginPath();ctx.moveTo(i,sy);ctx.lineTo(i,sy+sh);ctx.stroke();}}
  else if(selW===2){ctx.fillStyle='#8b6030';ctx.fillRect(sx,sy,sw,sh);ctx.fillStyle='#c8a060';ctx.fillRect(sx,sy,sw,4);ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=1;for(let i=Math.floor(sx/24)*24;i<sx+sw;i+=24)ctx.strokeRect(i,sy,24,Math.min(sh,12));}
  else if(selW===3){ctx.fillStyle='#0e4a3a';ctx.fillRect(sx,sy,sw,sh);ctx.fillStyle='#20b090';ctx.fillRect(sx,sy,sw,3);ctx.fillStyle='rgba(100,255,200,.05)';for(let i=sx;i<sx+sw;i+=14)ctx.fillRect(i,sy,7,sh);}
  else{ctx.fillStyle='#1a0808';ctx.fillRect(sx,sy,sw,sh);ctx.fillStyle='#ff3d00';ctx.fillRect(sx,sy,sw,3);ctx.strokeStyle='rgba(255,60,0,.12)';ctx.lineWidth=1;for(let i=sx;i<sx+sw;i+=16)ctx.strokeRect(i,sy,16,Math.min(sh,8));}
}
function dCoin(c){
  if(c.got)return;const sy=Math.sin(sec()*2.5+c.x*.07)*3;
  const cols=['#FFD700','#CE93D8','#FFCC80','#80DEEA','#FF7043'];
  ctx.fillStyle=cols[selW];ctx.beginPath();ctx.arc(c.x-camX,c.y+sy,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.arc(c.x-camX-2,c.y+sy-2,2.5,0,Math.PI*2);ctx.fill();
}
function dCP(){
  const sx=cpObj.x-camX,sy=cpObj.y;
  ctx.fillStyle='#666';ctx.fillRect(sx-1,sy-40,3,40);
  ctx.fillStyle=cpObj.hit?'#00e676':'#f44336';
  ctx.beginPath();ctx.moveTo(sx+2,sy-40);ctx.lineTo(sx+20,sy-33);ctx.lineTo(sx+2,sy-26);ctx.fill();
  if(cpObj.hit){ctx.fillStyle='rgba(0,230,118,.15)';ctx.beginPath();ctx.arc(sx,sy-40,13,0,Math.PI*2);ctx.fill();}
}
function dMovPlats(){
  const gc=['rgba(80,180,255,.45)','rgba(160,80,255,.45)','rgba(255,170,40,.45)','rgba(40,230,180,.45)','rgba(255,100,20,.45)'];
  const t=sec();
  for(const mp of movPlats){
    const sx=mp.x-camX;
    if(sx+mp.w<-10||sx>W+10)continue;
    ctx.fillStyle=gc[selW];ctx.fillRect(sx-3,mp.y-3,mp.w+6,mp.h+6);
    dPlat(mp);
    const f=.5+.5*Math.sin(t*4+mp.x0*.01);
    ctx.fillStyle=`rgba(255,255,255,${.12+f*.18})`;ctx.fillRect(sx,mp.y,mp.w,2);
  }
}
function dEnemies(){
  const bc=['#8B0000','#1a003a','#6b3a1f','#005f6b','#8B2500'];
  const hc=['#4a1500','#0d001a','#3b1f00','#002f38','#5c1000'];
  const ec=['#ff4444','#dd88ff','#ffbb44','#44ffee','#ff6600'];
  for(const e of enemies){
    if(e.dead&&e.respawn>=60)continue;
    const sx=e.x-camX;
    if(sx+e.w<-10||sx>W+10)continue;
    ctx.save();
    if(e.dead)ctx.globalAlpha=(60-e.respawn)/60;
    ctx.translate(sx+7,e.y);
    if(e.dir===-1)ctx.scale(-1,1);
    ctx.fillStyle='#222';ctx.fillRect(-5,12,4,6);ctx.fillRect(1,12,4,6);
    ctx.fillStyle=bc[selW];ctx.fillRect(-6,4,12,9);
    ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(-6,4,12,2);
    ctx.fillStyle='#FFCC80';ctx.fillRect(-4,0,8,5);
    ctx.fillStyle=ec[selW];ctx.fillRect(0,1,3,2);
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillRect(1,1,1,1);
    ctx.fillStyle=hc[selW];ctx.fillRect(-5,-4,10,4);ctx.fillRect(-3,-7,7,3);
    const dx=P.x-(e.x),dy=P.y-(e.y);
    if(Math.abs(dx)<80&&Math.abs(dy)<60){
      const a=.18+.12*Math.sin(sec()*12);
      ctx.fillStyle=`rgba(255,60,0,${a})`;ctx.beginPath();ctx.arc(0,-2,10,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}
function dChest(){
  const g=WD[selW].ls[selL].go,sx=g.x-camX,sy=g.y;
  if(phase==='complete'){const p=.5+.5*Math.sin(sec()*6);ctx.fillStyle=`rgba(255,215,0,${.1+p*.2})`;ctx.beginPath();ctx.arc(sx,sy-14,36,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#5c2d0a';ctx.fillRect(sx-18,sy-20,36,20);ctx.fillStyle='#8B4513';ctx.fillRect(sx-20,sy-26,40,9);
  ctx.fillStyle='#b8860b';ctx.fillRect(sx-18,sy-19,36,3);ctx.fillRect(sx-20,sy-25,40,2);
  ctx.fillStyle='#FFD700';ctx.fillRect(sx-4,sy-16,8,5);ctx.fillRect(sx-3,sy-11,6,4);
}
function dPlayer(){
  const p=P,sx=p.x-camX,sy=p.y;
  if(p.df>0&&Math.floor(p.df/2)%2===0)return;
  ctx.save();ctx.translate(sx+9,sy);if(p.face===-1)ctx.scale(-1,1);
  const coats=['#b71c1c','#4a148c','#e65100','#00695c','#880e4f'];
  ctx.fillStyle='#111';ctx.fillRect(-8,18,7,8);ctx.fillRect(1,18,7,8);
  ctx.fillStyle=coats[selW];ctx.fillRect(-9,6,18,14);
  ctx.fillStyle='#3e2723';ctx.fillRect(-9,14,18,3);ctx.fillStyle='#FFD700';ctx.fillRect(-3,14,6,3);
  ctx.fillStyle='#FFCC80';ctx.fillRect(-6,0,12,8);
  ctx.fillStyle='#111';ctx.fillRect(1,2,3,3);
  ctx.fillStyle='#0a0a0a';ctx.fillRect(-9,-5,18,5);ctx.fillRect(-6,-10,12,5);
  ctx.fillStyle='#ddd';ctx.fillRect(-2,-9,4,3);ctx.fillStyle='#0a0a0a';ctx.fillRect(-1,-8,1,2);ctx.fillRect(1,-8,1,2);
  if(p.wall&&!p.gnd){ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(p.wall===1?4:-10,-5,6,p.h);}
  ctx.restore();
}
function dHUD(){
  ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,38);
  const wd=WD[selW];
  txt(`${wd.e} ${wd.n} › ${wd.ls[selL].n}`,9,23,wd.c,11,'left',true);
  const ms=(phase==='play'?Date.now():t1)-t0;
  txt(fmt(ms),W/2-52,23,'#fff',14,'center',true);
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(W/2+10,17,5,0,Math.PI*2);ctx.fill();
  txt(`${P.nc}/${coins.length}`,W/2+32,23,'#fff',12,'center',true);
  txt(`☠ ${deaths}`,W-9,23,'#ff6b6b',12,'right',true);
  txt('ESC=menu',W-9,35,'rgba(255,255,255,.3)',9,'right',false);
}

function starField(){ctx.fillStyle='rgba(255,255,255,.32)';for(let i=0;i<55;i++)ctx.fillRect((i*97+3)%W,(i*61+5)%H,1.2,1.2);}

function dMenu(){
  ctx.fillStyle='#06060f';ctx.fillRect(0,0,W,H);starField();
  txt('PARKOUR',W/2,H/2-46,'#FFD700',56,'center',true);
  txt('WORLDS',W/2,H/2+9,'#fff',56,'center',true);
  txt('5 worlds  ·  15 levels  ·  beat the clock',W/2,H/2+45,'rgba(255,255,255,.35)',13,'center',false);
  if(Math.floor(sec()*2)%2===0)txt('Press SPACE or click to start',W/2,H/2+83,'#FFD700',14,'center',true);
}

function dWorldSelect(){
  ctx.fillStyle='#06060f';ctx.fillRect(0,0,W,H);starField();
  txt('Choose Your World',W/2,36,'#fff',15,'center',true);
  const cw=136,ch=316,gap=13,x0=(W-(5*cw+4*gap))/2;
  WD.slice(0,5).forEach((wd,wi)=>{
    const cx=x0+wi*(cw+gap),cy=50;
    const unlk=wUnlk(wi);
    ctx.fillStyle=unlk?'rgba(255,255,255,.07)':'rgba(255,255,255,.03)';
    ctx.strokeStyle=unlk?wd.c:'rgba(255,255,255,.15)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,8);ctx.fill();ctx.stroke();
    if(unlk){ctx.fillStyle=wd.c;ctx.beginPath();ctx.roundRect(cx,cy,cw,5,{upperLeft:8,upperRight:8,lowerLeft:0,lowerRight:0});ctx.fill();}
    txt(wd.e,cx+cw/2,cy+50,'#fff',30,'center',false);
    txt(wd.n,cx+cw/2,cy+70,unlk?'#fff':'rgba(255,255,255,.3)',10,'center',true);
    if(unlk){
      for(let i=0;i<4;i++)txt('★',cx+cw/2-26+i*18,cy+90,done[wi*4+i]?'#FFD700':'rgba(255,255,255,.15)',14,'left',false);
      wd.ls.forEach((lv,li)=>{
        const bx=cx+6,by=cy+102+li*52,bw=cw-12,bh=46;
        const ul=lUnlk(wi,li);
        ctx.fillStyle=ul?'rgba(255,255,255,.08)':'rgba(255,255,255,.03)';
        ctx.strokeStyle=ul?wd.c:'rgba(255,255,255,.08)';ctx.lineWidth=1;
        ctx.beginPath();ctx.roundRect(bx,by,bw,bh,5);ctx.fill();ctx.stroke();
        txt(lv.n,bx+bw/2,by+15,ul?'#ddd':'rgba(255,255,255,.25)',9,'center',true);
        const li2=wi*4+li;
        if(done[li2])txt(bests[li2].length?'★ '+fmt(bests[li2][0]):'cleared',bx+bw/2,by+31,'#FFD700',9,'center',false);
        else txt(ul?'play':'🔒 locked',bx+bw/2,by+31,ul?'rgba(255,255,255,.4)':'rgba(255,255,255,.2)',9,'center',false);
        if(ul&&hit(bx,by,bw,bh)){startLv(wi,li);MC=false;}
      });
    }else{
      txt('🔒',cx+cw/2,cy+166,'rgba(255,255,255,.25)',28,'center',false);
      txt(`clear ${WD[wi-1].e}`,cx+cw/2,cy+210,'rgba(255,255,255,.2)',9,'center',false);
      txt('to unlock',cx+cw/2,cy+224,'rgba(255,255,255,.2)',9,'center',false);
    }
  });
  const pw=WD[5],pbx=W/2-90,pby=H-46,pbw=180,pbh=30;
  ctx.fillStyle='rgba(255,255,255,.06)';ctx.strokeStyle='#aaaaaa';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(pbx,pby,pbw,pbh,5);ctx.fill();ctx.stroke();
  txt(`${pw.e}  ${pw.ls[0].n}  — practice`,W/2,pby+19,'#aaaaaa',10,'center',false);
  if(hit(pbx,pby,pbw,pbh)){startLv(5,0);MC=false;}
  txt('WASD / Arrows move  ·  Space jump  ·  Press into wall + jump = wall jump',W/2,H-52,'rgba(255,255,255,.25)',9,'center',false);
}

function dComplete(){
  const li=selW*4+selL,ms=t1-t0,b=bests[li];
  ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.04)';ctx.strokeStyle='rgba(255,215,0,.22)';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(W/2-196,H/2-152,392,304,10);ctx.fill();ctx.stroke();
  txt('Level Complete!',W/2,H/2-118,'#FFD700',24,'center',true);
  txt(fmt(ms),W/2,H/2-82,'#fff',22,'center',true);
  const mc=['#FFD700','#C0C0C0','#cd7f32'];
  if(runRank>=0)txt(['★ New Best! #1','★ Top 3  #2','★ Top 3  #3'][runRank],W/2,H/2-58,mc[runRank],12,'center',true);
  else txt('not a top 3 time',W/2,H/2-58,'rgba(255,255,255,.35)',11,'center',false);
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-146,H/2-42);ctx.lineTo(W/2+146,H/2-42);ctx.stroke();
  txt('BEST TIMES',W/2,H/2-26,'rgba(255,255,255,.45)',10,'center',false);
  b.forEach((t2,i)=>{
    const y=H/2-10+i*20,it=i===runRank;
    txt(['#1','#2','#3'][i],W/2-50,y,mc[i],11,'right',true);
    txt(fmt(t2),W/2-36,y,it?'#FFD700':'#ccc',12,'left',it);
    if(it)txt('◀',W/2+40,y,'rgba(255,215,0,.55)',9,'left',false);
  });
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W/2-146,H/2+52);ctx.lineTo(W/2+146,H/2+52);ctx.stroke();
  txt(`☠ ${deaths} death${deaths!==1?'s':''}`,W/2-65,H/2+70,'#ff6b6b',11,'center',false);
  txt(`${P.nc}/${coins.length} coins`,W/2+65,H/2+70,'#FFD700',11,'center',false);
  if(selW===5)txt('Practice complete!',W/2,H/2+102,'#aaaaaa',14,'center',true);
  else if(selW===4&&selL===3)txt('You conquered all 5 worlds!',W/2,H/2+102,'#FFD700',14,'center',true);
  else if(selL<3&&Math.floor(sec()*2)%2===0)txt('SPACE → next level',W/2,H/2+102,'#FFD700',13,'center',true);
  else if(selL===3&&selW<4)txt(`${WD[selW+1].n} unlocked! ${WD[selW+1].e}`,W/2,H/2+102,'#CE93D8',12,'center',true);
  txt('ESC → world select',W/2,H/2+124,'rgba(255,255,255,.4)',11,'center',false);
}

function loop(){
  requestAnimationFrame(loop);
  if(isEsc()){
    if(phase==='play'||phase==='complete'){phase='worldselect';MC=false;}
    else if(phase==='worldselect'){phase='menu';MC=false;}
  }
  if(phase==='menu'&&(isJ()||MC)){phase='worldselect';MC=false;}
  if(phase==='complete'&&isJ()&&selL<WD[selW].ls.length-1){startLv(selW,selL+1);MC=false;}
  upd();
  if(phase==='menu')dMenu();
  else if(phase==='worldselect')dWorldSelect();
  else{dBg();plats.forEach(dPlat);dMovPlats();coins.forEach(dCoin);dCP();dEnemies();dChest();dPlayer();dHUD();if(phase==='complete')dComplete();}
  MC=false;for(const k in JP)delete JP[k];
}

load().finally(()=>loop());
</script></body></html>
